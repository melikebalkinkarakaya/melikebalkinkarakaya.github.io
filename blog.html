<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Melike Balkın Karakaya | Blog</title>
  <meta name="description" content="Melike Balkın Karakaya'nın psikoloji, felsefe ve din felsefesi eksenindeki makaleleri, analizleri ve düşünceleri.">
  <link rel="canonical" href="https://melikebalkinkarakaya.org/blog.html" />
  <link rel="icon" href="/favicon.ico?v=1">
  
  <!-- Fonts & Icons -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">

  <style>
    :root {
      --navy: #0F172A;
      --maroon: #7C2D48;
      --gold: #C9A961;
      --cream: #FAF8F3;
      --white: #FFFFFF;
      --text-dark: #1F2937;
      --text-muted: #6B7280;
      --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1);
      --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--cream);
      color: var(--text-dark);
      line-height: 1.7;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      color: var(--navy);
    }

    a { text-decoration: none; transition: all 0.3s ease; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* Navigation */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250, 248, 243, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--maroon);
      padding: 1rem 0;
    }
    .nav-row { display: flex; align-items: center; justify-content: space-between; }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem; font-weight: 700;
      color: var(--navy);
    }
    .menu { display: flex; gap: 2rem; }
    .menu a {
      color: var(--text-dark); font-size: 0.9rem; font-weight: 500;
      position: relative;
    }
    .menu a:hover { 
      color: var(--maroon);
      text-shadow: 0 0 8px rgba(124, 45, 72, 0.3);
    }
    .menu a::after {
      content: ''; position: absolute; bottom: -4px; left: 0; width: 0; height: 2px;
      background: var(--maroon); transition: width 0.3s;
    }
    .menu a:hover::after { width: 100%; }
    
    .lang-switch { display: flex; gap: 8px; border-left: 2px solid var(--maroon); padding-left: 1rem; }
    .lang-btn {
      background: transparent; border: 1px solid transparent;
      cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-muted);
      padding: 4px 8px; border-radius: 6px;
    }
    .lang-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }
    .lang-btn:hover { border-color: var(--maroon); }

    /* Page Header */
    .page-header {
      padding: 80px 0 40px;
      text-align: center;
      border-bottom: 1px solid rgba(15, 23, 42, 0.1);
      margin-bottom: 60px;
    }
    .page-header h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      position: relative;
      display: inline-block;
    }
    .page-header h1::after {
      content: '';
      display: block;
      width: 80px;
      height: 4px;
      background: var(--maroon);
      margin: 16px auto 0;
    }
    .page-header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Blog List */
    .blog-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      padding-bottom: 80px;
    }

    .blog-card {
      background: var(--white);
      border-radius: 8px;
      padding: 30px;
      border-top: 6px solid var(--maroon);
      box-shadow: var(--shadow-sm);
      transition: all 0.4s ease;
      display: flex;
      flex-direction: column;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }
    .blog-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-lg);
      border-top-color: var(--navy);
    }
    .blog-card h2 {
      font-size: 1.4rem;
      margin-bottom: 12px;
      line-height: 1.3;
      color: var(--navy);
    }
    .blog-card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      flex-grow: 1;
      margin-bottom: 16px;
    }
    .meta {
      font-size: 0.85rem;
      color: var(--gold);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .meta::before {
      content: '\f073';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
    }

    /* Single Article */
    .article-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 0 80px;
    }
    .backlink {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--maroon);
      font-weight: 600;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .backlink:hover { color: var(--navy); }
    
    .article {
      background: var(--white);
      padding: 50px;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      border-left: 6px solid var(--maroon);
    }
    .article h1 {
      font-size: 2.2rem;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .article .date {
      color: var(--gold);
      font-style: italic;
      margin-bottom: 30px;
      display: block;
      font-size: 0.95rem;
      font-weight: 500;
    }
    .article p, .article ul, .article ol, .article blockquote {
      margin: 1.2rem 0;
      font-size: 1.05rem;
      line-height: 1.8;
    }
    .article blockquote {
      border-left: 4px solid var(--navy);
      padding-left: 20px;
      color: var(--text-muted);
      font-style: italic;
      background: var(--cream);
      padding: 15px 20px;
      border-radius: 0 8px 8px 0;
    }
    .article img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 20px 0;
      border: 2px solid var(--cream);
      box-shadow: var(--shadow-sm);
    }
    .article h2, .article h3 {
      margin: 2rem 0 1rem;
      color: var(--navy);
    }

    /* Notice */
    .notice {
      background: var(--white);
      border: 2px solid var(--maroon);
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      max-width: 600px;
      margin: 60px auto;
      box-shadow: var(--shadow-sm);
    }

    /* Footer */
    footer {
      background: linear-gradient(135deg, var(--navy) 0%, var(--maroon) 100%);
      color: rgba(250,248,243,0.8);
      text-align: center;
      padding: 40px 0;
      font-size: 0.9rem;
      border-top: 4px solid var(--gold);
    }

    @media (max-width: 768px) {
      .page-header h1 { font-size: 2.2rem; }
      .menu { display: none; }
      .article { padding: 30px 20px; }
      .article h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="container nav-row">
      <a href="index.html" class="brand">Melike Balkın Karakaya</a>
      <div class="menu">
        <a href="index.html">Ana Sayfa</a>
        <a href="index.html#kitaplar">Kitaplar</a>
        <a href="index.html#akademik">Akademik</a>
        <a href="index.html#videolar">Videolar</a>
        <a href="index.html#iletisim">İletişim</a>
      </div>
      <div class="lang-switch">
        <a href="blog.html" class="lang-btn active">TR</a>
        <a href="blog-en.html" class="lang-btn">EN</a>
      </div>
    </div>
  </nav>

  <main class="container" id="app" role="main">
    <noscript><p>Bu sayfa JavaScript ile çalışır. Lütfen tarayıcınızda JavaScript'i etkinleştirin.</p></noscript>
  </main>

  <footer>© 2026 Melike Balkın Karakaya | Uzman Klinik Psikolog & Yazar</footer>

  <script>
    const posts = [
      { slug: "kapalıyapı", title: "Kapalı Dini Yapıların Psikososyal Mekanizması", date: "30 Nisan 2026", excerpt: "Kapalı dini yapılar, bireylerin kimlik inşası ve aidiyet ihtiyaçlarını kullanarak kendilerini sürdürebilen psikososyal sistemlerdir. Bu yazıda, bu yapıların iç dinamikleri incelenmektedir..." },
      { slug: "aldatma", title: "Sessiz Kalan Travma: Aldatma, Erkeklik ve Toplumsal Körlük", date: "04 Ocak 2026", excerpt: "Bağırmayan ihanetler, yüceltilen suskunluklar ve yanlış yerde aranan masumiyet üzerine bir klinik analiz..." },
      { slug: "sessiz", title: "Zihnin Görünmez Duvarları: Bir Toplum Ne Zaman Körleşir?", date: "28 Aralık 2025", excerpt: "Bir toplum, yalnızca neyi konuştuğuyla değil; neyi konuşmamayı seçtiğiyle de hatırlanır. Sessizlik masum değildir..." },
      { slug: "en-zayif-halka", title: "En Zayıf Halka Türkiye mi?", date: "25 Aralık 2025", excerpt: "Türkiye gerçekten zayıf mıydı? Yoksa 'zayıf halka' söylemi, gerçeklerden çok politik bir algının ürünü müydü?" },
      { slug: "yasak-arttikca", title: "Yasak Arttıkça Aşırılık Neden Büyür?", date: "22 Aralık 2025", excerpt: "Ahlak baskının ürünü değildir. Bastırılan her dürtü nasıl patolojik biçimde geri dönüyorsa..." },
      { slug: "turkiye-iha-f16", title: "Türkiye İHA'yı Neden F-16 ile Vurdu?", date: "19 Aralık 2025", excerpt: "Bu bir zayıflık mı, yoksa bilinçli bir devlet mesajı mı? Hava sahası egemenliği üzerine bir analiz..." },
      { slug: "avm-kuyruklari", title: "AVM Kuyruklarını Refah Sanan Zihin", date: "18 Aralık 2025", excerpt: "Türkiye ekonomisini anlamayı reddeden yeni cehalet biçimi üzerine bir analiz..." },
      { slug: "raconun-bittigi-yer", title: "Raconun Bittiği Yer: Mafya Kılıfında Haysiyetsizlik", date: "01 Eylül 2025", excerpt: "Bir zamanlar yeraltı dünyasında bile bir kural vardı…" },
      { slug: "dijital-peygamberlik", title: "Dijital Peygamberlik: Grok'un Ardındaki Algı Dini", date: "13 Temmuz 2025", excerpt: "Grok'un içerikleri yazılım hatası değil; zihinsel bir operasyon…" },
      { slug: "egitimde-ideolojik-dil", title: "Eğitimde İdeolojik Dilin Çocuk Psikolojisine Etkisi", date: "17 Temmuz 2025", excerpt: "İdeolojik dilin çocuk psikolojisine etkileri…" },
      { slug: "cocuk-icin-adalet", title: "ÇOCUK İÇİN ADALET: DEVLETİN ARTIK YOLU BELLİDİR", date: "21 Ağustos 2025", excerpt: "Ağır cinsel suçlarda caydırıcılık ve vicdani norm…" },
      { slug: "kalpten-evrensele", title: "Kalpten Evrensele: Dillerin Ötesinde Bir Ses", date: "31 Temmuz 2025", excerpt: "Çok dilli yayıncılık ve evrensel yankı…" },
      { slug: "ahmet-icin-adalet", title: "Benim Çocuğumun Hayatını Hiçbir Ceza Geri Getiremez…", date: "23 Temmuz 2025", excerpt: "Ceza adaleti – onarma adaleti dengesi…" },
      { slug: "mizahin-ince-cizgisi", title: "Mizahın İnce Çizgisi: Doğan Pehlevan Üzerine Kişisel Bir Okuma", date: "01 Temmuz 2025", excerpt: "Mizah, bellek ve provokasyon çizgisi…" },
      { slug: "kenevir-yasasi-ve-sessiz-kaygilar", title: "Kenevir Yasası ve Sessiz Kaygılar", date: "30 Haziran 2025", excerpt: "Tıbbi kenevir düzenlemesi ve toplumsal fayda…" },
      { slug: "tibbi-kenevir", title: "Tıbbi Kenevir Meclis Gündeminde: Yasak Değil, Akılcı Kontrol Gerekli", date: "30 Haziran 2025", excerpt: "Veri odaklı izleme ve rehabilitasyon…" },
      { slug: "enerji-okumasi", title: '"Enerji Okuması" Liderliğin Gizli Silahı mı?', date: "08 Temmuz 2025", excerpt: "Sözel olmayan sinyaller ve regülasyon…" },
      { slug: "ortadogu-satranci", title: "Ortadoğu Satrancı ve Türkiye", date: "28 Mayıs 2025", excerpt: "Dinamik denge ve çok katmanlı diplomasi…" },
      { slug: "gencler-arasi-siddet", title: "Gençler Arasında Yükselen Şiddet", date: "01 Mayıs 2025", excerpt: "Anlatılamamış hikâyeler ve erken uyarı…" },
      { slug: "askin-cozulmesi", title: "Aşkın Çözülmesi: Tanrı'ya Uzanan Ruhsal Bir Yolculuk", date: "05 Mayıs 2025", excerpt: "Çözülmenin teslimiyeti ve yol…" },
      { slug: "krizler-guc-kaynagi-olabilir-mi", title: "Krizler Güç Kaynağı Olabilir mi?", date: "04 Nisan 2025", excerpt: "PTG ve hikâyeyi yeniden yazmak…" }
    ];

    const app = document.getElementById("app");
    const params = new URLSearchParams(window.location.search);
    const activeSlug = params.get("post");

    function renderList() {
      app.innerHTML = `
        <header class="page-header">
          <h1>Yazılar</h1>
          <p>Psikoloji, felsefe, travma, toplumsal analiz ve insan davranışı üzerine düşünceler.</p>
        </header>
        <section class="blog-list">
          ${posts.map(post => `
            <article class="blog-card" onclick="window.location.href='blog.html?post=${encodeURIComponent(post.slug)}'">
              <h2>${post.title}</h2>
              <p>${post.excerpt}</p>
              <span class="meta">${post.date}</span>
            </article>
          `).join("")}
        </section>
      `;
    }

    async function renderSingle(slug) {
      try {
        const response = await fetch(`${slug}.html`);
        if (!response.ok) throw new Error("not found");
        const html = await response.text();

        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        const title = doc.querySelector("h1")?.textContent?.trim() || doc.title || "Makale";
        const date = doc.querySelector(".date")?.textContent?.trim() || "";
        const content = doc.querySelector("article")?.innerHTML || doc.querySelector("main")?.innerHTML || doc.body.innerHTML;

        app.innerHTML = `
          <div class="article-container">
            <a class="backlink" href="blog.html">← Tüm yazılara dön</a>
            <article class="article">
              <h1>${title}</h1>
              ${date ? `<span class="date">${date}</span>` : ""}
              <div>${content}</div>
            </article>
          </div>
        `;
      } catch (error) {
        app.innerHTML = `
          <div class="notice">
            <p>Yazı yüklenemedi. Dosya adı ile slug eşleşmiyor olabilir.</p>
            <a class="backlink" href="blog.html">← Tüm yazılara dön</a>
          </div>
        `;
      }
    }

    if (activeSlug) {
      renderSingle(activeSlug);
    } else {
      renderList();
    }
  </script>
</body>
</html>

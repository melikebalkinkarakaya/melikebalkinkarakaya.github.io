  <style>
    :root {
      --navy: #0F172A;
      --maroon: #7C2D48;
      --gold: #C9A961;
      --cream: #FAF8F3;
      --white: #FFFFFF;
      --text-dark: #1F2937;
      --text-muted: #6B7280;
      --shadow-sm: 0 4px 6px -1px rgba(0,0,0,0.1);
      --shadow-md: 0 10px 15px -3px rgba(0,0,0,0.1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background-color: var(--cream);
      color: var(--text-dark);
      line-height: 1.7;
    }

    h1, h2, h3 {
      font-family: 'Playfair Display', serif;
      color: var(--navy);
    }

    a { text-decoration: none; transition: all 0.3s ease; }

    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    /* Navigation */
    .nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(250, 248, 243, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(15, 23, 42, 0.1);
      padding: 1rem 0;
    }
    .nav-row { display: flex; align-items: center; justify-content: space-between; }
    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem; font-weight: 700;
      color: var(--navy);
    }
    .menu { display: flex; gap: 2rem; }
    .menu a {
      color: var(--text-dark); font-size: 0.9rem; font-weight: 500;
    }
    .menu a:hover { color: var(--maroon); }
    .lang-switch { display: flex; gap: 8px; border-left: 1px solid #ddd; padding-left: 1rem; }
    .lang-btn {
      background: transparent; border: 1px solid transparent;
      cursor: pointer; font-size: 0.85rem; font-weight: 600; color: var(--text-muted);
      padding: 4px 8px; border-radius: 6px;
    }
    .lang-btn.active { background: var(--navy); color: var(--white); border-color: var(--navy); }

    /* Page Header */
    .page-header {
      padding: 80px 0 40px;
      text-align: center;
      border-bottom: 1px solid rgba(15, 23, 42, 0.1);
      margin-bottom: 60px;
    }
    .page-header h1 {
      font-size: 3rem;
      margin-bottom: 1rem;
      position: relative;
      display: inline-block;
    }
    .page-header h1::after {
      content: '';
      display: block;
      width: 60px;
      height: 3px;
      background: var(--gold);
      margin: 16px auto 0;
    }
    .page-header p {
      color: var(--text-muted);
      font-size: 1.1rem;
      max-width: 700px;
      margin: 0 auto;
    }

    /* Blog List */
    .blog-list {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 30px;
      padding-bottom: 80px;
    }

    .blog-card {
      background: var(--white);
      border-radius: 8px;
      padding: 30px;
      border-top: 4px solid var(--maroon);
      box-shadow: var(--shadow-sm);
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
      cursor: pointer;
    }
    .blog-card:hover {
      transform: translateY(-5px);
      box-shadow: var(--shadow-md);
    }
    .blog-card h2 {
      font-size: 1.4rem;
      margin-bottom: 12px;
      line-height: 1.3;
      color: var(--navy);
    }
    .blog-card p {
      color: var(--text-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      flex-grow: 1;
      margin-bottom: 16px;
    }
    .meta {
      font-size: 0.85rem;
      color: var(--gold);
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .meta::before {
      content: '\f073';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
    }

    /* Single Article */
    .article-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 40px 0 80px;
    }
    .backlink {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--maroon);
      font-weight: 600;
      margin-bottom: 30px;
      font-size: 0.95rem;
    }
    .backlink:hover { color: var(--navy); }
    
    .article {
      background: var(--white);
      padding: 50px;
      border-radius: 8px;
      box-shadow: var(--shadow-sm);
      border-left: 4px solid var(--gold);
    }
    .article h1 {
      font-size: 2.2rem;
      margin-bottom: 16px;
      line-height: 1.2;
    }
    .article .date {
      color: var(--gold);
      font-style: italic;
      margin-bottom: 30px;
      display: block;
      font-size: 0.95rem;
    }
    .article p, .article ul, .article ol, .article blockquote {
      margin: 1.2rem 0;
      font-size: 1.05rem;
      line-height: 1.8;
    }
    .article blockquote {
      border-left: 3px solid var(--maroon);
      padding-left: 20px;
      color: var(--text-muted);
      font-style: italic;
    }
    .article img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 20px 0;
    }
    .article h2, .article h3 {
      margin: 2rem 0 1rem;
      color: var(--navy);
    }

    /* Notice */
    .notice {
      background: var(--white);
      border: 1px solid #eee;
      border-radius: 8px;
      padding: 40px;
      text-align: center;
      color: var(--text-muted);
      max-width: 600px;
      margin: 60px auto;
    }

    /* Footer */
    footer {
      background: var(--navy);
      color: rgba(250,248,243,0.6);
      text-align: center;
      padding: 40px 0;
      font-size: 0.9rem;
      border-top: 4px solid var(--gold);
    }

    @media (max-width: 768px) {
      .page-header h1 { font-size: 2.2rem; }
      .menu { display: none; }
      .article { padding: 30px 20px; }
      .article h1 { font-size: 1.6rem; }
    }
  </style>
</head>

      }
    ];

    const app = document.getElementById("app");
    const params = new URLSearchParams(window.location.search);
    const activeSlug = params.get("post");

    function renderList() {
      app.innerHTML = `
        <header class="page-header">
          <h1>Writings</h1>
          <p>Thoughts on psychology, philosophy, trauma, social analysis, perception, and human behavior.</p>
        </header>
        <section class="blog-list">
          ${posts.map(post => `
            <article class="blog-card" onclick="window.location.href='blog-en.html?post=${encodeURIComponent(post.slug)}'">
              <h2>${post.title}</h2>
              <p>${post.excerpt}</p>
              <span class="meta">${post.date}</span>
            </article>
          `).join("")}
        </section>
      `;
    }

    async function renderSingle(slug) {
      const post = posts.find(p => p.slug === slug);

      if (!post) {
        app.innerHTML = `
          <div class="notice">
            <p>The article could not be found.</p>
            <a class="backlink" href="blog-en.html">← Back to all posts</a>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch(post.file);
        if (!response.ok) throw new Error("not found");

        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        const title = doc.querySelector("h1")?.textContent?.trim() || post.title;
        const date = doc.querySelector(".date")?.textContent?.trim() || post.date;
        const content = doc.querySelector("article")?.innerHTML || doc.querySelector("main")?.innerHTML || doc.body.innerHTML;

        app.innerHTML = `
          <div class="article-container">
            <a class="backlink" href="blog-en.html">← Back to all posts</a>
            <article class="article">
              <h1>${title}</h1>
              ${date ? `<span class="date">${date}</span>` : ""}
              <div>${content}</div>
            </article>
          </div>
        `;
      } catch (error) {
        app.innerHTML = `
          <div class="notice">
            <p>The article could not be loaded.</p>
            <a class="backlink" href="blog-en.html">← Back to all posts</a>
          </div>
        `;
      }
    }

    if (activeSlug) {
      renderSingle(activeSlug);
    } else {
      renderList();
    }
  </script>

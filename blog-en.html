<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="Melike Balkın Karakaya's articles on psychology, philosophy, and social analysis.">
  <link rel="canonical" href="https://melikebalkinkarakaya.org/blog-en.html" />
  <link rel="icon" href="/favicon.ico?v=1">
  <meta name="color-scheme" content="dark" />
  <meta name="theme-color" content="#0d1117">

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-BKY0021LPP"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-BKY0021LPP');

  <style>
    :root{
      --bg:#0d1117;
      --card:#161b22;
      --text:#e6edf3;
      --muted:#9aa4af;
      --brand:#58a6ff;
      --ring:rgba(88,166,255,.25);
      --container:1000px;
      --radius:18px;
      --border:#30363d;
    }

    *{box-sizing:border-box}
    html{scroll-behavior:smooth}

    body{
      margin:0;
      font:16px/1.65 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:#0d1117 !important;
    }

    a{color:var(--brand);text-decoration:none}

    .nav{
      position:sticky;
      top:0;
      z-index:50;
      backdrop-filter:blur(8px);
      background:rgba(13,17,23,.9);
      border-bottom:1px solid var(--border);
    }

    .container{
      max-width:var(--container);
      margin:auto;
      padding:0 20px;
    }

    .nav-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      min-height:64px;
      gap:16px;
    }

    .brand{
      font-weight:700;
      color:#fff;
    }

    .menu{
      display:flex;
      gap:16px;
      flex-wrap:wrap;
    }

    .menu a{
      padding:8px 12px;
      border-radius:10px;
      color:#c9d1d9;
    }

    .menu a:hover{
      background:#21262d;
    }

    .lang-switcher{
      display:flex;
      gap:8px;
      align-items:center;
    }

    .lang-btn{
      background:#21262d;
      border:1px solid #30363d;
      border-radius:12px;
      padding:6px 12px;
      cursor:pointer;
      font-size:18px;
      transition:.2s;
      text-decoration:none;
    }

    .lang-btn:hover{border-color:var(--brand)}
    .lang-btn.active{
      background:rgba(88,166,255,0.15);
      border-color:var(--brand);
      box-shadow:0 0 10px var(--ring);
    }

    .page-head{
      padding:46px 0 20px;
    }

    .page-head h1{
      margin:0 0 10px;
      font-size:36px;
      color:#fff;
      text-align:center;
    }

    .page-head p{
      margin:0 auto;
      max-width:760px;
      text-align:center;
      color:var(--muted);
    }

    .blog-list{
      display:grid;
      gap:22px;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      padding:22px 0 56px;
    }

    .blog-card{
      background:var(--card);
      border-radius:var(--radius);
      overflow:hidden;
      border:1px solid var(--border);
      box-shadow:0 4px 10px rgba(0,0,0,.25);
      transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      display:flex;
      flex-direction:column;
      text-decoration:none;
      color:inherit;
      padding:22px;
    }

    .blog-card:hover{
      transform:translateY(-4px);
      box-shadow:0 8px 18px rgba(0,0,0,.38);
      border-color:var(--brand);
    }

    .blog-card h2{
      margin:0 0 12px;
      font-size:22px;
      color:var(--brand);
      line-height:1.3;
    }

    .blog-card p{
      margin:0;
      color:var(--muted);
      font-size:15px;
      line-height:1.6;
    }

    .meta{
      display:block;
      margin-top:18px;
      font-size:13px;
      color:var(--muted);
      font-weight:500;
    }

    .article{
      background:var(--card);
      padding:2rem;
      border-radius:12px;
      border:1px solid var(--border);
      margin:2rem 0 3rem;
    }

    .article h1{
      margin-top:0;
      color:var(--brand);
      font-size:1.9rem;
      line-height:1.25;
    }

    .article .date{
      color:var(--muted);
      font-style:italic;
      margin:.25rem 0 1rem;
      display:block;
    }

    .article :where(p,ul,ol,blockquote,figure){
      margin:1rem 0;
    }

    .article img{
      max-width:100%;
      height:auto;
      border-radius:8px;
    }

    .backlink{
      display:inline-block;
      margin-bottom:1rem;
      color:var(--brand);
      font-weight:bold;
      text-decoration:none;
    }

    .notice{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:12px;
      padding:1.25rem;
      color:var(--muted);
      margin:2rem 0 3rem;
    }

    .footer{
      padding:40px 0;
      color:#8b949e;
      text-align:center;
      border-top:1px solid var(--border);
    }

    @media (max-width:700px){
      .nav-row{
        flex-direction:column;
        align-items:flex-start;
        padding:12px 0;
      }
      .page-head h1{
        font-size:30px;
      }
    }
  </style>
</head>
<body>

  <nav class="nav">
    <div class="container nav-row">
      <a class="brand" href="index.html">Melike Balkın Karakaya</a>

      <div class="menu">
        <a href="index.html">Home</a>
        <a href="index.html#hakkimda">About</a>
        <a href="index.html#iletisim">Contact</a>
        <a href="blog-en.html" style="color:var(--brand); font-weight:700;">Blog</a>
      </div>

      <div class="lang-switcher">
        <a href="blog.html" class="lang-btn" title="Türkçe">🇹🇷</a>
        <a href="blog-en.html" class="lang-btn active" title="English">🇬🇧</a>
      </div>
    </div>
  </nav>

  <main class="container" id="app" role="main">
    <section class="page-head">
      <h1>Global Thoughts</h1>
      <p>Articles on psychology, philosophy, trauma, social analysis, perception, and human behavior.</p>
    </section>

    <noscript><p>This page requires JavaScript to display the blog properly.</p></noscript>
  </main>

  <footer class="footer">
    <div class="container">© 2026 Melike Balkın Karakaya</div>
  </footer>

  <script>
    const posts = [
      {
        slug: "silent",
        file: "silent.html",
        title: "Silent Trauma: Infidelity, Masculinity, and Social Blindness",
        date: "January 04, 2026",
        excerpt: "A clinical look at why men suffer in silence after infidelity and how societal expectations create a blindness to male trauma."
      },
      {
        slug: "the-invisible-walls",
        file: "The Invisible.html",
        title: "The Invisible Walls of the Mind: When Does a Society Go Blind?",
        date: "December 28, 2025",
        excerpt: "A society is remembered not only by what it speaks of, but also by what it deliberately chooses not to speak of. Exploring collective memory and control."
      },
      {
        slug: "is-turkiye-the-weakest-link",
        file: "Is Türkiye.html",
        title: "Is Türkiye the \"Weakest Link\"?",
        date: "December 25, 2025",
        excerpt: "Was Türkiye truly weak? Or was the \"weakest link\" narrative a product of political perception? A strategic analysis of the Falcon 50 incident and hybrid warfare."
      },
      {
        slug: "why-does-excess-grow",
        file: "Why Does Excess .html",
        title: "Why Does Excess Grow as Prohibition Increases?",
        date: "December 22, 2025",
        excerpt: "Morality is not the product of oppression. An analysis of how suppressed impulses re-emerge as societal scandals."
      },
      {
        slug: "why-did-turkiye-down-a-drone",
        file: "Why Did Türkiye .html",
        title: "Why Did Türkiye Down a Drone with an F-16?",
        date: "December 19, 2025",
        excerpt: "Weakness, or a deliberate state message? Analyzing the strategic logic behind the downing of a UAV in Turkish airspace."
      },
      {
        slug: "mall-queues-prosperity",
        file: "AVM.html",
        title: "The Mindset Mistaking Mall Queues for Prosperity",
        date: "December 18, 2025",
        excerpt: "An analysis of economic ignorance and its psychological implications in Turkey. Why queues are symptoms of collapse, not wealth."
      },
      {
        slug: "where-the-code-ends",
        file: "Raconun Bittiği Yer.html",
        title: "Where the Code Ends: Mafia & Social Decay",
        date: "September 01, 2025",
        excerpt: "Analyzing how violence has become social media content and the erosion of moral codes among youth in modern society."
      },
      {
        slug: "no-sentence-can-bring-my-child-back",
        file: "Benim Çocuğumun.html",
        title: "No Sentence Can Bring My Child Back...",
        date: "July 23, 2025",
        excerpt: "A mother's demand for justice: Why the age of a perpetrator should not outweigh the loss of a life."
      },
      {
        slug: "impact-of-ideological-language",
        file: "Eğitimde İdeolojik .html",
        title: "Impact of Ideological Language in Education",
        date: "July 17, 2025",
        excerpt: "Analyzing how political discourse in education impacts child development and psychological safety."
      },
      {
        slug: "digital-prophethood",
        file: "digital-prophethood.html",
        title: "Digital Prophethood: The Religion Behind Grok",
        date: "July 13, 2025",
        excerpt: "Evaluating AI as an actor of psychological warfare and perception management."
      },
      {
        slug: "energy-reading",
        file: "Liderliğin Gizli Silahı.html",
        title: "Energy Reading: The Hidden Weapon of Leadership?",
        date: "July 08, 2025",
        excerpt: "Exploring the silent power of psychological attunement and energy management in leadership."
      },
      {
        slug: "fine-line-of-humor",
        file: "Mizahın İnce Çizgisi.html",
        title: "The Fine Line of Humor: A Reading of Doğan Pehlevan",
        date: "July 01, 2025",
        excerpt: "Analyzing the role of cartoonists in collective memory and strategic polarization."
      },
      {
        slug: "cannabis-law-and-silent-anxieties",
        file: "Kenevir Yasası.html",
        title: "The Cannabis Law and Silent Anxieties",
        date: "June 30, 2025",
        excerpt: "A strategic analysis on capital interests and market monopolies in the emerging industry."
      },
      {
        slug: "medical-cannabis",
        file: "Tıbbi Kenevir.html",
        title: "Medical Cannabis: Rational Regulation Is Needed",
        date: "June 30, 2025",
        excerpt: "Evaluating the parliamentary agenda from a clinical and harm-reduction perspective."
      },
      {
        slug: "the-dissolution-of-love",
        file: "Aşkın Çözülmesi En.html",
        title: "The Dissolution of Love: A Spiritual Journey",
        date: "May 05, 2025",
        excerpt: "How love dissolves the ego and leads the soul back to its Creator through Sufi insights."
      },
      {
        slug: "rising-violence-among-youth",
        file: "Sessiz Bir Çığlık.html",
        title: "Rising Violence Among Youth: A Silent Cry?",
        date: "May 01, 2025",
        excerpt: "An analysis of suppressed anger in today's youth from a clinical perspective."
      },
      {
        slug: "can-crises-become-strength",
        file: "CAN CRISES BECOME A SOURCE OF STRENGTH.html",
        title: "Can Crises Become a Source of Strength?",
        date: "April 04, 2025",
        excerpt: "Exploring post-traumatic growth and the potential for rebirth within every collapse."
      }
    ];

    const app = document.getElementById("app");
    const params = new URLSearchParams(window.location.search);
    const activeSlug = params.get("post");

    function renderList() {
      app.innerHTML = `
        <section class="page-head">
          <h1>Global Thoughts</h1>
          <p>Articles on psychology, philosophy, trauma, social analysis, perception, and human behavior.</p>
        </section>

        <section class="blog-list">
          ${posts.map(post => `
            <a class="blog-card" href="blog-en.html?post=${encodeURIComponent(post.slug)}">
              <h2>${post.title}</h2>
              <p>${post.excerpt}</p>
              <span class="meta">${post.date}</span>
            </a>
          `).join("")}
        </section>
      `;
    }

    async function renderSingle(slug) {
      const post = posts.find(p => p.slug === slug);

      if (!post) {
        app.innerHTML = `
          <div class="notice">
            <p>The article could not be found.</p>
            <a class="backlink" href="blog-en.html">← Back to all posts</a>
          </div>
        `;
        return;
      }

      try {
        const response = await fetch(post.file);
        if (!response.ok) throw new Error("not found");

        const html = await response.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        const title =
          doc.querySelector("h1")?.textContent?.trim() ||
          post.title;

        const date =
          doc.querySelector(".date")?.textContent?.trim() ||
          post.date;

        const content =
          doc.querySelector("article")?.innerHTML ||
          doc.querySelector("main")?.innerHTML ||
          doc.body.innerHTML;

        app.innerHTML = `
          <article class="article">
            <a class="backlink" href="blog-en.html">← Back to all posts</a>
            <h1>${title}</h1>
            ${date ? `<span class="date">${date}</span>` : ""}
            <div>${content}</div>
          </article>
        `;
      } catch (error) {
        app.innerHTML = `
          <div class="notice">
            <p>The article could not be loaded.</p>
            <a class="backlink" href="blog-en.html">← Back to all posts</a>
          </div>
        `;
      }
    }

    if (activeSlug) {
      renderSingle(activeSlug);
    } else {
      renderList();
    }
  </script>
</body>
</html>

  <style>
  :root{--bg:#0d1117;--card:#161b22;--text:#e6edf3;--muted:#9aa4af;--brand:#58a6ff;--ring:rgba(88,166,255,.25);--container:1100px;--radius:18px;--danger:#f85149;--whatsapp:#25D366}
  *{box-sizing:border-box} html{scroll-behavior:smooth}
  body{margin:0;font:16px/1.65 system-ui,-apple-system,"Segoe UI",Roboto,Arial,sans-serif;color:var(--text);background:var(--bg)}
  a{color:var(--brand);text-decoration:none} img{max-width:100%;display:block}
  .container{max-width:var(--container);margin:auto;padding:0 20px}

  .nav{position:sticky;top:0;z-index:50;backdrop-filter:blur(8px);background:rgba(13,17,23,.9);border-bottom:1px solid #30363d}
  .nav-row{display:flex;align-items:center;justify-content:space-between;height:64px}
  .brand{font-weight:700;color:#fff}
  .menu{display:flex;gap:12px;flex-wrap:wrap}
  .menu a{padding:8px 12px;border-radius:10px;color:#c9d1d9;font-size:14px}
  .menu a:hover{background:#21262d}

  .lang{display:flex;gap:10px;align-items:center}
  .lang-btn{background:#21262d;border:1px solid #30363d;border-radius:12px;padding:6px 10px;cursor:pointer;font-size:18px;display:flex;align-items:center;transition:0.2s;text-decoration:none}
  .lang-btn.active{background:rgba(88,166,255,0.15);border-color:var(--brand);box-shadow:0 0 10px var(--ring)}

  .hero{padding:84px 0 48px;background:radial-gradient(1200px 600px at 80% -10%, rgba(88,166,255,.18), transparent), linear-gradient(135deg,#0d1117 0%,#161b22 100%)}
  .hero-grid{display:flex;align-items:center;justify-content:space-between;gap:24px}
  h1{font-size:42px;line-height:1.15;margin:0 0 10px}
  .lead{color:var(--muted);max-width:58ch;margin:6px 0 18px}
  .cta{display:flex;gap:12px;flex-wrap:wrap}
  .btn{background:var(--brand);color:#0b1020;padding:12px 18px;border-radius:12px;font-weight:600;display:inline-flex;align-items:center;gap:8px}
  .btn.alt{background:#21262d;color:#e6edf3}
  .hero-image img{max-width:250px;border-radius:50%;border:3px solid var(--brand);box-shadow:0 4px 15px rgba(0,0,0,.4)}

  .whatsapp-box {margin-top: 24px; text-align: center; background: rgba(37, 211, 102, 0.05); border: 1px solid rgba(37, 211, 102, 0.2); border-radius: 16px; padding: 24px;}
  .ws-notice {font-size: 14px; color: var(--muted); margin-bottom: 16px; line-height: 1.4;}
  .ws-btn {background: var(--whatsapp); color: #fff !important; padding: 14px 24px; border-radius: 12px; font-weight: 700; display: inline-flex; align-items: center; gap: 10px; transition: 0.3s; box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);}
  .ws-btn:hover {transform: scale(1.02); filter: brightness(1.1);}
  .ws-btn.disabled {opacity: 0.3; pointer-events: none; filter: grayscale(1); box-shadow: none;}
  .ws-warning {font-size: 12px; color: var(--danger); font-weight: 600; margin-top: 12px; display: block;}
  
  .consent-area {margin-bottom: 20px; display: flex; justify-content: center;}
  .consent-wrapper {display: flex; align-items: center; gap: 10px; cursor: pointer; background: rgba(255,255,255,0.05); padding: 12px 18px; border-radius: 10px; border: 1px solid #30363d; transition: 0.2s;}
  .consent-wrapper:hover {border-color: var(--brand);}
  .consent-wrapper input {width: 20px; height: 20px; cursor: pointer;}

  .latest-post-section {margin-top: -30px; position: relative; z-index: 10;}
  .latest-post-card {background: #1c2128; border: 1px solid var(--whatsapp); border-radius: 16px; padding: 20px; display: flex; align-items: center; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); transition: 0.3s; text-decoration: none;}
  .latest-post-card:hover {transform: translateY(-3px); border-color: #fff;}
  .latest-tag {background: var(--whatsapp); color: #0d1117; padding: 4px 10px; border-radius: 6px; font-size: 12px; font-weight: bold; text-transform: uppercase;}
  .latest-title {font-size: 18px; font-weight: bold; color: #fff; margin: 5px 0;}
  .latest-link {margin-left: auto; background: rgba(37, 211, 102, 0.1); color: var(--whatsapp); padding: 8px 16px; border-radius: 8px; font-size: 14px; font-weight: bold;}

  .section{padding:48px 0}
  .section-title{font-size:24px;margin:0 0 20px;border-left:4px solid var(--brand);padding-left:12px}
  .card{background:var(--card);border:1px solid #30363d;border-radius:var(--radius);padding:24px}

  .grid {display:grid;grid-template-columns:repeat(auto-fit, minmax(220px, 1fr));gap:25px}
  .item-card {background:var(--card);border:1px solid #30363d;border-radius:14px;padding:16px;text-align:center;transition:transform 0.2s;display:flex;flex-direction:column}
  .item-card img {width:100%;border-radius:10px;margin-bottom:12px;aspect-ratio:3/4;object-fit:cover}
  
  .about-content h3 {color: var(--brand); font-size: 18px; margin-top: 25px; border-bottom: 1px solid #30363d; padding-bottom: 8px;}
  .about-content ul {list-style: none; padding: 0; display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 10px; margin-top: 15px;}
  .about-content li::before {content: "•"; color: var(--brand); margin-right: 8px; font-weight: bold;}
  
  .social-grid {display:grid;grid-template-columns:repeat(auto-fill, minmax(160px, 1fr));gap:12px;margin-top:20px}
  .social-link {background:#21262d;border:1px solid #30363d;border-radius:12px;padding:12px;display:flex;align-items:center;gap:10px;color:#c9d1d9;transition:0.2s;font-size:14px}
  .social-link:hover {background:var(--brand);color:#0b1020;border-color:transparent}

  .footer{padding:40px 0;text-align:center;color:var(--muted);border-top:1px solid #30363d}
  @media (max-width:768px){.hero-grid{flex-direction:column;text-align:center} .latest-post-card {flex-direction: column; text-align: center;} .latest-link {margin: 10px 0 0 0; width: 100%;}}
  </style>
</head>

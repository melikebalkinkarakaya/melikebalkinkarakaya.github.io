<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark" />
  <title>Melike Balkın Karakaya | Blog</title>
  <meta name="description" content="Melike Balkın Karakaya'nın psikoloji, felsefe ve din felsefesi eksenindeki makaleleri, analizleri ve düşünceleri.">
  <link rel="canonical" href="https://melikebalkinkarakaya.org/blog.html" />
  <link rel="icon" href="/favicon.ico?v=1">
  <meta name="theme-color" content="#0d1117">

  <style>
    :root{
      color-scheme: dark !important;
      --bg-color:#0d1117; 
      --card-color:#161b22; 
      --text-color:#e6edf3;
      --muted:#9aa4af; 
      --accent-color:#58a6ff; 
      --border:#30363d;
    }
    
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    
    /* Zemin rengini !important ile kilitledik */
    html, body {
      background-color: #0d1117 !important;
      color: var(--text-color) !important;
    }

    body{
      margin:0;
      font-family:'Segoe UI',system-ui,-apple-system,Roboto,Arial,sans-serif;
      line-height:1.6;
    }

    header{
      position:sticky;
      top:0;
      background:rgba(13,17,23,.9);
      backdrop-filter:blur(10px);
      padding:1rem 2rem;
      display:flex;
      justify-content:space-between;
      align-items:center;
      border-bottom:1px solid var(--border);
      z-index:100;
    }
    
    header h1{margin:0;font-size:1.5rem;color:var(--accent-color);letter-spacing:.2px}
    nav a{color:var(--text-color);text-decoration:none;margin-left:1rem;transition:color .2s;font-weight:500}
    nav a:hover{color:var(--accent-color)}

    .container{max-width:900px;margin:2rem auto;padding:0 1rem}

    .blog-post{
      background:var(--card-color);
      padding:1.5rem;
      border-radius:12px;
      box-shadow:0 4px 12px rgba(0,0,0,.3);
      margin-bottom:2rem;
      border:1px solid var(--border);
      transition:transform .18s, box-shadow .18s
    }
    .blog-post:hover{transform:translateY(-2px);box-shadow:0 8px 16px rgba(0,0,0,.38); border-color: var(--accent-color);}
    .blog-post h2{margin:0 0 .35rem;font-size:1.35rem;line-height:1.3}
    .blog-post h2 a{color:var(--accent-color);text-decoration:none}
    .blog-post h2 a:hover{text-decoration:underline}
    .blog-post p{margin:.35rem 0 0; color: #c9d1d9;}
    .meta{display:block;margin-top:.6rem;font-size:.85rem;color:var(--muted)}

    .article{background:var(--card-color);padding:2.2rem;border-radius:12px;border:1px solid var(--border);margin-bottom:2rem}
    .article h1{margin-top:0;color:var(--accent-color);font-size:1.9rem;line-height:1.25}
    .article .date{color:var(--muted);font-style:italic;margin:.25rem 0 1.5rem;display:block}
    .article :where(p,ul,ol,blockquote,figure){margin:1.2rem 0; font-size: 1.1rem; line-height: 1.8;}
    .article img{max-width:100%;height:auto;border-radius:8px}
    .backlink{display:inline-block;margin-bottom:1.5rem; color: var(--accent-color); font-weight: bold;}

    footer{text-align:center;padding:3rem 1rem;color:#8b949e;font-size:.9rem;border-top:1px solid var(--border); background: #0d1117;}

    @media (max-width:600px){
      header{flex-direction:column; gap: 10px; text-align: center;} 
      nav{margin-top:.5rem; display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;}
      nav a {margin-left: 0; font-size: 14px;}
    }
  </style>
</head>
<body>

  <header>
    <h1>Melike Balkın Karakaya | Blog</h1>
    <nav>
      <a href="index.html">Ana Sayfa</a>
      <a href="index.html#hakkimda">Hakkımda</a>
      <a href="index.html#iletisim">İletişim</a>
      <a href="blog-en.html">English 🇬🇧</a>
    </nav>
  </header>

  <main class="container" id="app" role="main">
    <noscript><p>Bu sayfa JavaScript ile çalışır. Lütfen tarayıcınızda JavaScript'i etkinleştirin.</p></noscript>
  </main>

  <footer>© 2026 Melike Balkın Karakaya</footer>

  <script>
    // ---- MAKALE LİSTESİ (Yeni makale en üstte) ----
    const posts = [
      { 
        slug: "Silent Trauma", 
        title: "Sessiz Kalan Travma: Aldatma, Erkeklik ve Toplumsal Körlük", 
        date: "04 Ocak 2026", 
        excerpt: "Klinik bir bakış açısıyla; erkeklerin aldatılma sonrası neden sustuğu ve toplumsal beklentilerin bu travmayı nasıl körleştirdiği üzerine bir analiz." 
      },
      { 
        slug: "sessiz", 
        title: "Zihnin Görünmez Duvarları: Bir Toplum Ne Zaman Körleşir?", 
        date: "28 Aralık 2025", 
        excerpt: "Bir toplum, yalnızca neyi konuştuğuyla değil; neyi konuşmamayı seçtiğiyle de hatırlanır. Sessizlik masum değildir..." 
      },
      { 
        slug: "En Zayıf Halka", 
        title: "En Zayıf Halka Türkiye mi?", 
        date: "25 Aralık 2025", 
        excerpt: "Türkiye gerçekten zayıf mıydı? Yoksa 'zayıf halka' söylemi, gerçeklerden çok politik bir algının ürünü müydü?" 
      },
      { 
        slug: "Yasak Arttıkça ", 
        title: "Yasak Arttıkça Aşırılık Neden Büyür?", 
        date: "22 Aralık 2025", 
        excerpt: "Ahlak baskının ürünü değildir. Bastırılan her dürtü nasıl patolojik biçimde geri dönüyorsa..."
      },
      { 
        slug: "Türkiye İHA’yı Neden F-16 ile Vurdu", 
        title: "Türkiye İHA’yı Neden F-16 ile Vurdu?", 
        date: "19 Aralık 2025", 
        excerpt: "Bu bir zayıflık mı, yoksa bilinçli bir devlet mesajı mı? Hava sahası egemenliği üzerine bir analiz..."
      },
      { 
        slug: "AVM Kuyruklarını Refah Sanan Zihin", 
        title: "AVM Kuyruklarını Refah Sanan Zihin", 
        date: "18 Aralık 2025", 
        excerpt: "Türkiye ekonomisini anlamayı reddeden yeni cehalet biçimi üzerine bir analiz..."
      },
      { 
        slug: "raconun-bittigi-yer", 
        title: "Raconun Bittiği Yer: Mafya Kılıfında Haysiyetsizlik", 
        date: "01 Eylül 2025", 
        excerpt: "Bir zamanlar yeraltı dünyasında bile bir kural vardı…"
      },
      { 
        slug: "dijital-peygamberlik", 
        title: "Dijital Peygamberlik: Grok’un Ardındaki Algı Dini", 
        date: "13 Temmuz 2025", 
        excerpt: "Grok’un içerikleri yazılım hatası değil; zihinsel bir operasyon…"
      },
      { 
        slug: "egitimde-ideolojik-dil", 
        title: "Eğitimde İdeolojik Dilin Çocuk Psikolojisine Etkisi", 
        date: "17 Temmuz 2025", 
        excerpt: "İdeolojik dilin çocuk psikolojisine etkileri…"
      },
      { 
        slug: "cocuk-icin-adalet", 
        title: "ÇOCUK İÇİN ADALET: DEVLETİN ARTIK YOLU BELLİDİR", 
        date: "21 Ağustos 2025", 
        excerpt: "Ağır cinsel suçlarda caydırıcılık ve vicdani norm…"
      },
      { 
        slug: "ahmet-icin-adalet", 
        title: "Benim Çocuğumun Hayatını Hiçbir Ceza Geri Getiremez…", 
        date: "23 Temmuz 2025", 
        excerpt: "Ceza adaleti – onarma adaleti dengesi…"
      },
      { 
        slug: "askin-cozulmesi", 
        title: "Aşkın Çözülmesi: Tanrı’ya Uzanan Ruhsal Bir Yolculuk", 
        date: "05 Mayıs 2025", 
        excerpt: "Çözülmenin teslimiyeti ve yol…"
      },
      { 
        slug: "krizler-guc-kaynagi-olabilir-mi", 
        title: "Krizler Güç Kaynağı Olabilir mi?", 
        date: "04 Nisan 2025", 
        excerpt: "PTG ve hikâyeyi yeniden yazmak…"
      }
    ];

    const $ = sel => document.querySelector(sel);
    const el = (tag, attrs={}, html="")=>{
      const node=document.createElement(tag);
      Object.entries(attrs).forEach(([k,v])=> node.setAttribute(k,v));
      if(html) node.innerHTML = html;
      return node;
    };

    const getSlug = ()=> new URLSearchParams(location.search).get("post");

    function navigateTo(slug){
      const url = new URL(location.href);
      if(slug){ url.searchParams.set("post", slug); } else { url.searchParams.delete("post"); }
      history.pushState({}, "", url);
      render();
      window.scrollTo({top:0, behavior:"smooth"});
    }

    function renderList(container){
      posts.forEach(p=>{
        const art = el("article", {class:"blog-post"});
        const h2 = el("h2", {}, `<a href="#" data-slug="${p.slug}">${p.title}</a>`);
        const excerpt = p.excerpt ? el("p", {}, p.excerpt) : null;
        const meta = el("span", {class:"meta"}, p.date || "");
        art.append(h2);
        if(excerpt) art.append(excerpt);
        art.append(meta);
        container.appendChild(art);
      });
      container.querySelectorAll('a[data-slug]').forEach(a=>{
        a.addEventListener('click', e=>{ e.preventDefault(); navigateTo(a.getAttribute('data-slug')); });
      });
      document.title = "Melike Balkın Karakaya | Blog";
    }

    async function renderDetail(container, slug){
      const meta = posts.find(x=>x.slug===slug);
      const back = el("a", {href:"#", class:"backlink"}, "← Tüm makalelere dön");
      back.addEventListener('click', e=>{ e.preventDefault(); navigateTo(null); });

      const art = el("article", {class:"article"});
      const loading = el("p", {}, "Makale yükleniyor, lütfen bekleyin...");
      art.append(loading);
      container.append(back, art);

      try{
        const path = `${encodeURIComponent(slug)}.html`;
        const res = await fetch(path);
        if(!res.ok) throw new Error(`Dosya bulunamadı: ${slug}.html`);
        
        let html = await res.text();
        html = html.replace(/<script[\s\S]*?>[\s\S]*?<\/script>/gi, "");
        const tmp = document.createElement("div");
        tmp.innerHTML = html;

        const titleText = tmp.querySelector("h1")?.textContent?.trim() || meta?.title || "Makale";
        art.innerHTML = "";
        const h1 = el("h1", {}, titleText);
        const date = meta?.date ? el("span",{class:"date"}, meta.date) : null;
        
        let contentNode = tmp.querySelector("article") || tmp.querySelector("main") || tmp;
        const bodyDiv = el("div", {}, contentNode.innerHTML);

        art.append(h1);
        if(date) art.append(date);
        art.append(bodyDiv);

        document.title = `${titleText} | Blog`;

      }catch(err){
        art.innerHTML = `<p style="color:var(--danger)">Hata: Makale dosyası yüklenemedi.</p>
                         <p>Lütfen sunucuda <b>${slug}.html</b> dosyasının var olduğunu kontrol edin.</p>`;
      }
    }

    function render(){
      const app = $("#app");
      app.innerHTML = "";
      const slug = getSlug();
      if(slug){ renderDetail(app, slug); }
      else { renderList(app); }
    }
    window.addEventListener("popstate", render);
    render();
  </script>
</body>
</html>
